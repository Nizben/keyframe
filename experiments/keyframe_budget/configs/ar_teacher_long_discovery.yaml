experiment_name: ar_teacher_long_discovery
output_root: outputs/ar_teacher_long_keyframe_budget
model_config_path: configs/ar_diffusion_tf_chunkwise.yaml
checkpoint: checkpoints/chunkwise/ar_diffusion.pt
backend: default
use_ema: false
dtype: bfloat16

# AR-teacher long rollout: 120 latent frames with 3 frames per causal chunk
# gives 40 budgeted chunks and decodes to 477 visible frames at 16 fps.
fast_steps: 8
heavy_steps: 24
target_avg_steps: 12

num_output_frames: 120
fps: 16
num_prompts: 24
seeds: [0, 1, 2]
prompt_set: experiments/keyframe_budget/prompts/motion_rich_24.json

run_exhaustive_single_heavy: true
run_policy_comparison: false
debug_cache_logs: false
save_chunk_boundaries: true
suffix_window_latent: 32
latent_to_visible_ratio: 4

# Scientific safety guards: this experiment must not use the distilled
# long-video checkpoint/backend.
expected_checkpoint_basename: ar_diffusion.pt
forbidden_backend: long_video
